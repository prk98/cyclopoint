<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycloPoint | For Akansha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #064e3b, #020617);
            background-attachment: fixed;
        }

        /* Soft Animated Background Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(16, 185, 129, 0.1);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(31, 41, 55, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(17, 24, 39, 0.8);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            background: rgba(17, 24, 39, 1);
        }

        /* Wiggle Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .shake-error {
            animation: shake 0.4s ease-in-out;
            border-color: #ef4444 !important;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>

<body class="text-gray-100 flex items-center justify-center min-h-screen p-4 overflow-hidden">
    
    <div class="blob"></div>
    <div class="blob" style="right: 0; bottom: 0; background: rgba(5, 150, 105, 0.08);"></div>

    <div class="w-full max-w-md glass-card rounded-[2rem] overflow-hidden relative">
        
        <div class="flex p-2 bg-black/20 m-4 rounded-2xl gap-1">
            <button id="loginBtn" onclick="toggleAuth('login')"
                class="w-1/2 py-3 text-sm font-bold transition-all duration-500 rounded-xl text-emerald-400 bg-emerald-500/10">
                Login
            </button>
            <button id="registerBtn" onclick="toggleAuth('register')"
                class="w-1/2 py-3 text-sm font-bold transition-all duration-500 rounded-xl text-gray-400 hover:text-gray-200">
                Register
            </button>
        </div>

        <div class="p-8 pt-4">
            <div class="mb-8 text-center">
                <span class="text-3xl mb-2 block">🌿</span>
                <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-emerald-300 to-emerald-500 bg-clip-text text-transparent">
                    CycloPoint
                </h1>
                <p class="text-gray-400 text-xs mt-1 tracking-widest uppercase">For Akansha's Wellbeing</p>
            </div>

            <div id="loginSection" class="transition-all duration-500">
                <form th:action="@{/login}" method="POST" class="space-y-4">
                    <div class="group">
                        <input type="text" name="username" placeholder="Username" required
                            class="input-field w-full px-5 py-4 border border-gray-700/50 rounded-2xl outline-none text-sm">
                    </div>
                    <div class="group">
                        <input type="password" name="password" placeholder="Password" required
                            class="input-field w-full px-5 py-4 border border-gray-700/50 rounded-2xl outline-none text-sm">
                    </div>
                    <button type="submit"
                        class="btn-glow w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl font-bold transition-all transform active:scale-95 shadow-lg">
                        Welcome Back
                    </button>
                </form>
            </div>

            <div id="registerSection" class="hidden transition-all duration-500">
                <div id="errorAlert" th:if="${error}"
                    class="mb-6 p-4 bg-red-500/10 border border-red-500/20 text-red-300 text-xs rounded-xl flex items-center gap-3">
                    <span>✨</span> <p th:text="${error}"></p>
                </div>

                <form th:action="@{/register}" method="POST" class="space-y-4">
                    <input type="text" id="regUsername" name="username" placeholder="Choose a name" required
                        th:classappend="${error != null} ? 'shake-error' : ''"
                        class="input-field w-full px-5 py-4 border border-gray-700/50 rounded-2xl outline-none text-sm">
                    
                    <input type="password" name="password" placeholder="Secure Password" required
                        class="input-field w-full px-5 py-4 border border-gray-700/50 rounded-2xl outline-none text-sm">
                    
                    <button type="submit"
                        class="btn-glow w-full py-4 bg-emerald-700 hover:bg-emerald-600 text-white rounded-2xl font-bold transition-all transform active:scale-95 shadow-lg">
                        Start Your Path
                    </button>
                </form>
            </div>

            <p id="toggleHint" class="mt-8 text-center text-xs text-gray-500">
                New here? <button onclick="toggleAuth('register')" class="text-emerald-400 hover:text-emerald-300 font-semibold underline decoration-emerald-800 underline-offset-4">Grow your forest today</button>
            </p>
        </div>

        <div class="p-4 bg-black/10 text-center border-t border-white/5">
            <p class="text-[10px] text-gray-500 italic">"Step into your own rhythm, Akansha."</p>
        </div>
    </div>

    <script th:inline="javascript">
        function toggleAuth(mode) {
            const loginSection = document.getElementById('loginSection');
            const registerSection = document.getElementById('registerSection');
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');
            const hint = document.getElementById('toggleHint');

            if (mode === 'register') {
                loginSection.classList.add('hidden');
                registerSection.classList.remove('hidden');
                registerBtn.classList.add('text-emerald-400', 'bg-emerald-500/10');
                registerBtn.classList.remove('text-gray-400');
                loginBtn.classList.remove('text-emerald-400', 'bg-emerald-500/10');
                loginBtn.classList.add('text-gray-400');
                hint.innerHTML = 'Already with us? <button onclick="toggleAuth(\'login\')" class="text-emerald-400 font-semibold underline decoration-emerald-800 underline-offset-4">Back to Login</button>';
            } else {
                registerSection.classList.add('hidden');
                loginSection.classList.remove('hidden');
                loginBtn.classList.add('text-emerald-400', 'bg-emerald-500/10');
                loginBtn.classList.remove('text-gray-400');
                registerBtn.classList.remove('text-emerald-400', 'bg-emerald-500/10');
                registerBtn.classList.add('text-gray-400');
                hint.innerHTML = 'New here? <button onclick="toggleAuth(\'register\')" class="text-emerald-400 font-semibold underline decoration-emerald-800 underline-offset-4">Grow your forest today</button>';
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const hasError = /*[[${error != null}]]*/ false;
            
            if (hasError || urlParams.has('register')) {
                toggleAuth('register');
            }

            const regInput = document.getElementById('regUsername');
            if (regInput) {
                regInput.addEventListener('input', function() {
                    this.classList.remove('shake-error');
                });
            }

            const errorDiv = document.getElementById('errorAlert');
            if (errorDiv) {
                setTimeout(() => {
                    errorDiv.style.opacity = '0';
                    errorDiv.style.transition = 'opacity 1s ease';
                    setTimeout(() => errorDiv.remove(), 1000);
                }, 5000);
            }
        });
    </script>
</body>
</html>
